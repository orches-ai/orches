<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <style><![CDATA[
    /* Рука с палочкой — основа анимации дирижирования.
       transform-box: view-box — все элементы группы используют единую систему координат SVG,
       иначе каждый rect крутился бы вокруг своего bbox и палочка "отрывалась" от руки. */
    .baton-arm {
      transform-origin: 24px 122px;
      transform-box: view-box;
      animation: conduct 1.1s ease-in-out infinite;
    }

    @keyframes conduct {
      0%   { transform: rotate(-18deg); }
      25%  { transform: rotate(-2deg); }
      50%  { transform: rotate(10deg); }
      75%  { transform: rotate(-2deg); }
      100% { transform: rotate(-18deg); }
    }

    /* Голова кивает слегка вниз в такт — чтобы не было зазора между головой и телом */
    .head {
      transform-box: view-box;
      animation: bob 1.1s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(1.5px); }
    }

    /* Ноты вылетают из кончика палочки, плывут вверх и растворяются */
    .note {
      opacity: 0;
      animation: float 2.4s ease-out infinite;
    }
    .note-1 { animation-delay: 0s;    }
    .note-2 { animation-delay: 0.8s;  }
    .note-3 { animation-delay: 1.6s;  }

    @keyframes float {
      0%   { opacity: 0; transform: translate(0, 0) rotate(-4deg); }
      20%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; transform: translate(0, -60px) rotate(6deg); }
    }
  ]]></style>

