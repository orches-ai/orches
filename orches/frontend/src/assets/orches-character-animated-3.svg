<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <style><![CDATA[
    /* Сценарий "работа завершена" — разовый проигрыш:
       0-20%    — замах палочки вверх
       20-50%   — поклон: корпус и голова наклоняются, шляпа приподнимается,
                   рука опускается вниз/в сторону
       50-100%  — плавный возврат в исходное положение
       После окончания всё остаётся в исходной позе.
       Задержка 0.5s позволяет увидеть "статичный старт". */

    .baton-arm {
      transform-origin: 24px 122px;
      transform-box: view-box;
      animation: finalSwing 2.5s ease-in-out 0.5s 1 both;
    }

    @keyframes finalSwing {
      0%    { transform: rotate(0deg); }
      20%   { transform: rotate(-28deg); }
      50%   { transform: rotate(25deg); }
      100%  { transform: rotate(0deg); }
    }

    /* Корпус (всё кроме ног) — кланяется вперёд и возвращается */
    .torso {
      transform-origin: 110px 176px;
      transform-box: view-box;
      animation: bow 2.5s ease-in-out 0.5s 1 both;
    }

    @keyframes bow {
      0%, 20%  { transform: rotate(0deg) translateY(0); }
      50%      { transform: rotate(6deg) translateY(2px); }
      100%     { transform: rotate(0deg) translateY(0); }
    }

    /* Голова добавляет свой наклон вперёд */
    .head {
      transform-box: view-box;
      transform-origin: 110px 96px;
      animation: headBow 2.5s ease-in-out 0.5s 1 both;
    }

    @keyframes headBow {
      0%, 20%  { transform: rotate(0deg); }
      50%      { transform: rotate(8deg); }
      100%     { transform: rotate(0deg); }
    }

    /* Шляпа приподнимается во время поклона */
    .hat {
      transform-box: view-box;
      animation: hatTip 2.5s ease-in-out 0.5s 1 both;
    }

    @keyframes hatTip {
      0%, 20%  { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
      100%     { transform: translateY(0); }
    }
  ]]></style>

