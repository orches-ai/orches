services:
  orches:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./orches/data:/app/data
      - ./orches/workspace:/app/workspace
      - ./orches/registry/agents:/app/registry/agents
    env_file:
      - path: ./orches/.env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
